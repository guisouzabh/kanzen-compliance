services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - landing
      - api
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env.production
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  frontend:
    build:
      context: ../rlk-front
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
    restart: unless-stopped

  landing:
    build:
      context: ../landing-front
      dockerfile: Dockerfile
      args:
        VITE_WHATSAPP_NUMBER: ${VITE_WHATSAPP_NUMBER}
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - api_uploads:/app/uploads
      - api_arquivos_s3:/app/arquivos-s3

  db:
    image: mariadb:10.11
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      MARIADB_DATABASE: ${MYSQL_DATABASE}
      MARIADB_USER: ${MYSQL_USER}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  api_uploads:
  api_arquivos_s3:
  mariadb_data:
  caddy_data:
  caddy_config:
